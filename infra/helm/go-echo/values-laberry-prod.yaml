replicaCount: 1

image:
  repository: ghcr.io/kiukairor/go-echo
  pullPolicy: IfNotPresent
  tag: "sha-e437643"

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8080

env:
  PORT: "8080"
  OTEL_SERVICE_NAME: "go-echo"
  OTEL_EXPORTER_OTLP_ENDPOINT: "https://otlp.nr-data.net"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment.name=laberry-prod"

secrets:
  newrelic: newrelic-secret

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"
